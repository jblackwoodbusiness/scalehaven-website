# ════════════════════════════════════════════════════════════
# ScaleHaven — Netlify Configuration
# ════════════════════════════════════════════════════════════

[build]
  publish = "."

# Force trailing slashes off — matches canonical URLs
# This is CRITICAL for SEO: /page and /page/ should not both be indexed
[[redirects]]
  from = "/med-spa-lead-generation/"
  to = "/med-spa-lead-generation"
  status = 301
  force = true

[[redirects]]
  from = "/med-spa-facebook-ads/"
  to = "/med-spa-facebook-ads"
  status = 301
  force = true

[[redirects]]
  from = "/botox-clinic-marketing/"
  to = "/botox-clinic-marketing"
  status = 301
  force = true

[[redirects]]
  from = "/dermatology-marketing/"
  to = "/dermatology-marketing"
  status = 301
  force = true

[[redirects]]
  from = "/aesthetic-clinic-marketing/"
  to = "/aesthetic-clinic-marketing"
  status = 301
  force = true

[[redirects]]
  from = "/med-spa-marketing-near-me/"
  to = "/med-spa-marketing-near-me"
  status = 301
  force = true

[[redirects]]
  from = "/styles/main.css"
  to = "/styles/main.css"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/brand_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers on all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"

# Pretty URLs: Netlify handles /slug → /slug/index.html natively
# No explicit redirects needed for directory-based routing
